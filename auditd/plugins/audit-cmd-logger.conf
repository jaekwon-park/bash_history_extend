# ============================================================
# audit-cmd-logger.conf
# audisp plugin configuration for audit-cmd-logger
#
# For auditd 3.x (RHEL 8+, Ubuntu 20.04+):
#   Copy to /etc/audit/plugins.d/audit-cmd-logger.conf
#
# For auditd 2.x (RHEL 6/7, Ubuntu 18.04 and older):
#   Copy to /etc/audisp/plugins.d/audit-cmd-logger.conf
# ============================================================

# Enable this plugin
active = yes

# Direction: out = plugin receives events FROM the audit system
direction = out

# Full path to the audit-cmd-logger binary
path = /usr/local/bin/audit-cmd-logger

# Plugin type:
#   always  = run continuously as a long-lived daemon (recommended)
#   builtin = built-in plugin (not applicable here)
type = always

# Arguments passed to the binary (empty = use defaults)
# args =

# Format of records sent to the plugin:
#   string = human-readable text (recommended, easier to parse)
#   binary = binary-encoded (lower overhead, harder to parse)
format = string
