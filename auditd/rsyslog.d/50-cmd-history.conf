# ============================================================
# 50-cmd-history.conf
# rsyslog routing for audit-cmd-logger
#
# Install to: /etc/rsyslog.d/50-cmd-history.conf
#
# Flow:
#   auditd → audisp → audit-cmd-logger → syslog(local5.info)
#                                              ↓
#                                   rsyslog → /var/log/cmd_history.log
# ============================================================

# audit-cmd-logger 프로그램이 local5.info 로 전송한 메시지를
# /var/log/cmd_history.log 에 기록하고 다른 로그 파일로의 전파를 중단한다.

if $programname == 'audit-cmd-logger' then {
    action(type="omfile"
           file="/var/log/cmd_history.log"
           fileOwner="root"
           fileGroup="adm"
           fileCreateMode="0640"
           dirCreateMode="0750")
    stop
}
